# AWS Amplify Hosting — alternative to CodeBuild+S3
# In Amplify console: set build spec to this file or paste equivalent.
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
